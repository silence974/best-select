<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>best-select</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; background: #0b1020; color: #f5f7ff; }
      .wrap { max-width: 900px; margin: 48px auto; padding: 24px; }
      .card { background: #121a33; border: 1px solid #2a3767; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
      code { background: #1b274a; padding: 2px 6px; border-radius: 6px; }
      .ok { color: #5eead4; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>best-select 部署骨架</h1>
        <p>前端建议部署在 <code>GitHub Pages</code>，后端建议部署在 <code>Render</code>。</p>
        <p>后端 API 地址由 <code>window.BEST_SELECT_API_BASE</code> 注入，默认是 <code>/api</code>。</p>
      </div>
      <div class="card">
        <h2>后端连通性</h2>
        <p id="runtime">检测中...</p>
      </div>
    </div>

    <script>
      const API_BASE = window.BEST_SELECT_API_BASE || "https://best-select-backend.onrender.com";
      const runtimeEl = document.getElementById("runtime");

      fetch(`${API_BASE}/api/v1/runtime`)
        .then((resp) => resp.json())
        .then((data) => {
          runtimeEl.innerHTML = `<span class="ok">连接成功</span> | env=${data.app_env}, version=${data.app_version}, supabase=${data.supabase_enabled}`;
        })
        .catch((err) => {
          runtimeEl.textContent = `连接失败: ${err.message}`;
        });
    </script>
  </body>
</html>
